# Builds the Expo web export and deploys it to GitHub Pages on every push to main.
name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # npm install (not "npm ci") because Expo's beta react-compiler pins make the
        # lockfile strict-check fragile across npm versions. This reconciles automatically.
        run: npm install --no-audit --no-fund

      # GitHub project pages live at https://<user>.github.io/<repo>/, so the web
      # bundle must know its sub-path. This injects it automatically from the repo name.
      # If you use a CUSTOM DOMAIN at the root, set BASE_URL: "/" below instead.
      - name: Configure base URL
        env:
          BASE_URL: "/${{ github.event.repository.name }}"
        run: |
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('app.json','utf8'));j.expo.web=j.expo.web||{};j.expo.web.output='single';j.expo.experiments=Object.assign({},j.expo.experiments,{baseUrl:process.env.BASE_URL});fs.writeFileSync('app.json',JSON.stringify(j,null,2));console.log('baseUrl =',process.env.BASE_URL);"

      - name: Export web build
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_AZURE_AD_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_AZURE_AD_CLIENT_ID }}
          EXPO_PUBLIC_AZURE_AD_TENANT_ID: ${{ secrets.EXPO_PUBLIC_AZURE_AD_TENANT_ID }}
          EXPO_PUBLIC_ADMIN_EMAILS: ${{ secrets.EXPO_PUBLIC_ADMIN_EMAILS }}
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
        run: npx expo export --platform web

      - name: SPA fallback (404 -> index)
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
